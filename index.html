<!DOCTYPE html>
<html>
<head>
  <title>CRIGHTEOUSGAMER</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f1a;
      color: white;
    }

    header {
      background: purple;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
    }

    .menu-btn {
      font-size: 24px;
      cursor: pointer;
    }

    .menu {
      display: none;
      background: #1e1e2f;
    }

    .menu a {
      display: block;
      padding: 12px;
      color: white;
      text-decoration: none;
      border-bottom: 1px solid #333;
    }

    .menu a:hover {
      background: purple;
    }

    .section {
      padding: 15px;
    }

    .title {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .card {
      background: #1e1e2f;
      margin-bottom: 15px;
      padding: 15px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px;
      background: purple;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    iframe {
      width: 100%;
      height: 200px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<header>
  <div>CRIGHTEOUSGAMER 🎮</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<div class="menu" id="menu">
  <a href="#">Home</a>
  <a href="#games">Games</a>
  <a href="#wallpapers">Wallpapers</a>
  <a href="#youtube">YouTube</a>
</div>

<!-- GAMES -->
<div class="section" id="games">
  <div class="title">🎮 Games</div>

  <div class="card">
    <h3>FIFA 23 Mobile</h3>
    <img src="https://via.placeholder.com/400x200">
    <p>Download FIFA 23 for Android</p>
    <a class="btn" href="#">Download</a>
  </div>

  <div class="card">
    <h3>PES 2024</h3>
    <img src="https://via.placeholder.com/400x200">
    <p>Latest PES version</p>
    <a class="btn" href="#">Download</a>
  </div>
</div>

<!-- WALLPAPERS -->
<div class="section" id="wallpapers">
  <div class="title">🔥 Wallpapers</div>

  <div class="card">
    <img src="https://via.placeholder.com/400x700">
    <a class="btn" href="#">Download Wallpaper</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/400x700">
    <a class="btn" href="#">Download Wallpaper</a>
  </div>
</div>

<!-- YOUTUBE -->
<div class="section" id="youtube">
  <div class="title">📺 YouTube</div>

  <div class="card">
    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>
  </div>
</div>

<script>
function toggleMenu() {
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
</body>
</html>
